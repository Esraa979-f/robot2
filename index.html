<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الروبوتات الذكي</title>
    <style>
        /* تعريف الألوان والخطوط */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #ff9f43;
            --fixed-bg: #fff0f0;
            --mobile-bg: #f0f7ff;
            --text-main: #2d3436;
            --shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* رأس الصفحة */
        .header-section {
            background: var(--primary-gradient);
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 1000px;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
        }

        .header-section h1 { margin: 0; font-size: 2.5rem; }
        .header-section p { margin: 10px 0 0; font-size: 1.2rem; opacity: 0.9; }

        /* منطقة اللعب */
        .game-area {
            display: flex;
            width: 100%;
            max-width: 1100px;
            gap: 30px;
            align-items: flex-start;
        }

        /* قائمة العناصر (الجانب الأيمن) */
        .items-sidebar {
            flex: 0 0 280px;
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-top: 5px solid var(--accent-color);
        }

        .sidebar-title {
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.4rem;
        }

        .robot-card {
            background: #ffffff;
            border: 2px solid #e1e8ed;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: grab;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            color: #444;
        }

        .robot-card:hover {
            border-color: #764ba2;
            transform: scale(1.03);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .robot-card.dragging { opacity: 0.5; border-style: dashed; }

        /* مناطق الإسقاط (الجانب الأيسر) */
        .drop-containers {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .zone {
            background: white;
            border-radius: 25px;
            padding: 35px;
            min-height: 160px;
            border: 3px dashed #cbd5e0;
            position: relative;
            transition: 0.3s;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }

        .zone-header {
            position: absolute;
            top: -18px;
            right: 30px;
            padding: 5px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.3rem;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .fixed-zone { background: var(--fixed-bg); }
        .fixed-zone .zone-header { background: #e74c3c; }
        
        .mobile-zone { background: var(--mobile-bg); }
        .mobile-zone .zone-header { background: #3498db; }

        .zone.drag-over {
            background: #edf2f7;
            border-color: #764ba2;
            transform: translateY(-2px);
        }

        /* العناصر عند وضعها بنجاح */
        .robot-card.placed {
            background: #2ecc71;
            color: white;
            border: none;
            cursor: default;
            font-size: 1.1rem;
            padding: 10px 20px;
        }

        /* رسائل النجاح والخطأ */
        #feedback-msg {
            font-size: 1.5rem;
            font-weight: bold;
            height: 40px;
            margin: 20px 0;
            text-align: center;
        }

        .reload-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 159, 67, 0.4);
        }

        .reload-btn:hover { background: #e67e22; transform: translateY(-2px); }

        /* تنسيق الجوال */
        @media (max-width: 768px) {
            .game-area { flex-direction: column; }
            .items-sidebar { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>أنواع الروبوتات الذكية 🤖</h1>
        <h2> تصميم المعلمة: إسراء الهذلي -  إشراف مديرة المدرسة: منى الغامدي</h2>
        <h2>قم بسحب الروبوت ووضعه في مكانه الصحيح</h2>
    </div>

    <div class="game-area">
        <div class="drop-containers">
            <div id="fixed-target" class="zone fixed-zone" data-type="ثابت">
                <div class="zone-header">الروبوتات الثابتة</div>
            </div>
            
            <div id="mobile-target" class="zone mobile-zone" data-type="متنقل">
                <div class="zone-header">الروبوتات المتنقلة</div>
            </div>
        </div>

        <div class="items-sidebar">
            <div class="sidebar-title">قائمة الروبوتات</div>
            <div id="robots-list"></div>
        </div>
    </div>

    <div id="feedback-msg"></div>
    <button class="reload-btn" onclick="location.reload()">ابدأ التحدي من جديد 🔄</button>

    <script>
        // البيانات بناءً على الملف المرفق
        const robotsData = [
            { id: 1, name: "أذرع روبوتية في المصانع", type: "ثابت" },
            { id: 2, name: "أجهزة الصراف الآلي", type: "ثابت" },
            { id: 3, name: "طائرات مسيرة (درون)", type: "متنقل" },
            { id: 4, name: "سيارات ذاتية القيادة", type: "متنقل" },
            { id: 5, name: "روبوتات التنظيف", type: "متنقل" }
        ];

        const listContainer = document.getElementById('robots-list');
        const zones = document.querySelectorAll('.zone');
        const feedback = document.getElementById('feedback-msg');

        // إنشاء العناصر وخلطها عشوائياً
        function createGame() {
            const shuffled = [...robotsData].sort(() => Math.random() - 0.5);
            shuffled.forEach(item => {
                const el = document.createElement('div');
                el.className = 'robot-card';
                el.draggable = true;
                el.innerText = item.name;
                el.dataset.type = item.type;
                
                el.addEventListener('dragstart', () => el.classList.add('dragging'));
                el.addEventListener('dragend', () => el.classList.remove('dragging'));
                
                listContainer.appendChild(el);
            });
        }

        // منطق السحب والإسقاط
        zones.forEach(zone => {
            zone.addEventListener('dragover', e => {
                e.preventDefault();
                zone.classList.add('drag-over');
            });

            zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));

            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                const dragged = document.querySelector('.dragging');
                
                if (dragged.dataset.type === zone.dataset.type) {
                    zone.appendChild(dragged);
                    dragged.classList.add('placed');
                    dragged.draggable = false;
                    showFeedback("أحسنت! إجابة متميزة ✅", "#27ae60");
                    checkCompletion();
                } else {
                    showFeedback("حاول مرة أخرى يا بطل ❌", "#e74c3c");
                }
            });
        });

        function showFeedback(text, color) {
            feedback.innerText = text;
            feedback.style.color = color;
            setTimeout(() => { if(feedback.innerText === text) feedback.innerText = ""; }, 1500);
        }

        function checkCompletion() {
            if (listContainer.children.length === 0) {
                feedback.innerText = "🎊 مبروك! لقد أنجزت المهمة بنجاح!";
                feedback.style.color = "#764ba2";
            }
        }

        createGame();
    </script>
</body>
</html>
